name: calypso-implementation-loop
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  write-increment:
    needs:
    - blocked
    - consult-blueprint
    - consult-implementation-rules
    - consult-issue-spec
    - diagnose-stuck
    - evaluate-results
    - request-clarification
    if: needs.blocked.outputs.event == 'issue-cleared' || needs.consult-blueprint.outputs.event == 'implementation-unblocked'
      || needs.consult-implementation-rules.outputs.event == 'implementation-unblocked' || needs.consult-issue-spec.outputs.event
      == 'implementation-unblocked' || needs.diagnose-stuck.outputs.event == 'inconsistency-identified-and-corrected' || needs.evaluate-results.outputs.event
      == 'tests-failing-with-progress' || needs.request-clarification.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          Write minimal code to advance failing tests. Only what current red tests require — no more. Do not commit, push, refactor, or clean up.
  run-tests:
    needs:
    - fix-test-infra
    - write-increment
    if: needs.fix-test-infra.outputs.event == 'infrastructure-fixed' || needs.write-increment.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: bun test
      shell: bash
  evaluate-results:
    needs: run-tests
    if: needs.run-tests.outputs.event == 'tests-all-pass' || needs.run-tests.outputs.event == 'tests-still-failing'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          Evaluate test output:
          - All pass → exit-success
          - Failures changed (progress) → write-increment
          - Same failures ≥2 increments (stuck) → diagnose-stuck
          - Runner crashed (import/build/env error) → fix-test-infra
          - Uncertain what code should do → consult-issue-spec
  diagnose-stuck:
    needs: evaluate-results
    if: needs.evaluate-results.outputs.event == 'tests-failing-no-progress'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          No progress ≥2 increments. Diagnose: (1) test correctly written against stub interface? (2) stub matches test expectations? (3) implementation approach fundamentally misaligned? Fixable inconsistency → correct + write-increment. Infra problem → fix-test-infra. Still blocked → consult-issue-spec.
  consult-issue-spec:
    needs:
    - diagnose-stuck
    - evaluate-results
    - fix-test-infra
    if: needs.diagnose-stuck.outputs.event == 'still-cannot-identify-path' || needs.evaluate-results.outputs.event == 'implementation-uncertain'
      || needs.fix-test-infra.outputs.event == 'still-cannot-identify-path'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          Escalation L1: re-read full GitHub issue. For each acceptance criterion, state in one sentence what code change satisfies it. Compare implementation against spec — identify any mismatch. Misalignment found → write-increment. Still unclear → consult-implementation-rules.
  consult-implementation-rules:
    needs: consult-issue-spec
    if: needs.consult-issue-spec.outputs.event == 'still-unclear-after-spec'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: guru
        prompt: |
          Escalation L2: read rules/implementations/ for this language/domain. Check each failing test against rules — wrong module boundary? forbidden dependency? disallowed pattern? missing abstraction? Rule violation found → note rule + write-increment. Still unclear → consult-blueprint.
  consult-blueprint:
    needs: consult-implementation-rules
    if: needs.consult-implementation-rules.outputs.event == 'still-unclear-after-rules'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: guru
        prompt: |
          Escalation L3: read rules/blueprints/ for this domain. Does the feature conflict with blueprint invariants? Do tests require a different architectural approach? Blueprint resolves it → note principle + write-increment. Still unclear after all 3 levels → request-clarification (state precisely what is ambiguous and why none of the 3 reference levels resolved it).
  fix-test-infra:
    needs:
    - diagnose-stuck
    - evaluate-results
    - run-tests
    if: needs.diagnose-stuck.outputs.event == 'test-infrastructure-error' || needs.evaluate-results.outputs.event == 'test-infrastructure-error'
      || needs.run-tests.outputs.event == 'test-infrastructure-error'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          Test runner failed before reaching test logic. Fix root cause: missing import, build error, env var, test setup, tooling config. Do not suppress or skip tests. Fixed → run-tests. Needs external dependency → consult-issue-spec.
  request-clarification:
    needs: consult-blueprint
    if: needs.consult-blueprint.outputs.event == 'still-unclear-after-blueprint'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Answer the clarification question to unblock the implementation loop.
  exit-success:
    needs: evaluate-results
    if: needs.evaluate-results.outputs.event == 'all-tests-passing'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: exit-success'''
      shell: bash
  blocked:
    needs: write-increment
    if: needs.write-increment.outputs.event == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: A step hit an unexpected blocking condition requiring human resolution.
  aborted:
    needs: blocked
    if: needs.blocked.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
