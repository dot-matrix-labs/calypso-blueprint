name: calypso-default-feature-workflow
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  create-worktree:
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          Ensure correct worktree for the dispatched issue:
          - Branch: `feature/<issue-number>-<slug>` from current main.
          - Missing → create branch + worktree, push to origin, open draft PR (populate from issue: motivation, features checklist, test plan).
          - Exists → verify clean, correct branch, up-to-date with origin.
          - cd into worktree. All subsequent work happens here.
  review-issue:
    needs:
    - blocked
    - create-worktree
    if: needs.blocked.outputs.event == 'issue-cleared' || needs.create-worktree.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          Read the full GitHub issue. Understand scope and acceptance criteria. Check phase checkboxes to find resume point. Set status to in-progress. Dispatch to earliest unchecked phase.
  create-documentation:
    needs: review-issue
    if: needs.review-issue.outputs.event == 'phase-documentation'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          Write/update feature docs (purpose, API contract, usage) before any code. Commit docs. Check "documentation" checkbox on issue.
  create-stubs:
    needs:
    - create-documentation
    - review-issue
    if: needs.create-documentation.outputs.event == 'on_success' || needs.review-issue.outputs.event == 'phase-stubs'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          Define public types, interfaces, module boundaries. Function bodies empty or typed zero values — no logic. Check "stubs" checkbox on issue.
  write-failing-tests:
    needs:
    - create-stubs
    - review-issue
    if: needs.create-stubs.outputs.event == 'on_success' || needs.review-issue.outputs.event == 'phase-tdd'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          TDD red phase: write tests covering all acceptance criteria. Tests must fail because implementation is missing, not due to errors. Include unit, integration, and e2e tests per criteria. No implementation logic. Check "tdd" checkbox on issue.
  implementation-loop:
    needs:
    - resolve-merge-conflict
    - review-issue
    - save-state
    - write-failing-tests
    if: needs.resolve-merge-conflict.outputs.event == 'rebase-clean-tests-fail' || needs.review-issue.outputs.event == 'phase-implementation'
      || needs.save-state.outputs.event == 'exit-incomplete' || needs.write-failing-tests.outputs.event == 'on_success'
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    uses: ./.github/workflows/calypso-implementation-loop.yml
  save-state:
    needs:
    - implementation-loop
    - resolve-merge-conflict
    - review-issue
    if: needs.implementation-loop.outputs.event == 'exit-success' || needs.resolve-merge-conflict.outputs.event == 'rebase-clean-tests-pass'
      || needs.review-issue.outputs.event == 'phase-save'
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    uses: ./.github/workflows/calypso-save-state.yml
  resolve-merge-conflict:
    needs: save-state
    if: needs.save-state.outputs.event == 'conflict-with-main'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          `git fetch origin main && git rebase origin/main`. Resolve conflicts: preserve both sides unless logically incompatible (prefer feature intent, note in commit msg). Run full test suite after rebase. Tests pass → save-state. Tests fail → implementation-loop.
  done:
    needs:
    - review-issue
    - save-state
    if: needs.review-issue.outputs.event == 'all-phases-complete' || needs.save-state.outputs.event == 'exit-complete'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - create-documentation
    - create-stubs
    - create-worktree
    - resolve-merge-conflict
    - write-failing-tests
    if: needs.create-documentation.outputs.event == 'on_failure' || needs.create-stubs.outputs.event == 'on_failure' || needs.create-worktree.outputs.event
      == 'on_failure' || needs.resolve-merge-conflict.outputs.event == 'rebase-conflict-unresolvable' || needs.write-failing-tests.outputs.event
      == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking issue before development can continue.
  aborted:
    needs:
    - blocked
    - implementation-loop
    - save-state
    if: needs.blocked.outputs.event == 'abort' || needs.implementation-loop.outputs.event == 'aborted' || needs.save-state.outputs.event
      == 'aborted'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
