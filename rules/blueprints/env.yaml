    name: manual-cluster-provisioning
    type: antipattern
    description: >
      Manual cluster provisioning via cloud console, ad-hoc CLI commands, or written runbooks.
      Creates undocumented state. The next provisioning will produce a different result.
      Provisioning is code.
    links:
