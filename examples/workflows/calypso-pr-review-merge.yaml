name: calypso-pr-review-merge
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  check-pr-structure:
    needs: blocked
    if: needs.blocked.outputs.event == 'issue-cleared'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["pr-single-issue-enforced", "pr-no-conflicts", "pr-issue-tasks-complete"]'
  check-feature-completeness:
    needs:
    - blocked
    - check-pr-structure
    if: needs.blocked.outputs.event == 'skip-to-completeness' || needs.check-pr-structure.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: merge-queue
        cost: guru
        prompt: |
          Verify: all phase checkboxes checked (documentation, stubs, tdd, implementation, saved), all acceptance criteria met, PR features + test plan checklists complete, PR description current. Report any missing items.
  check-ci:
    needs:
    - blocked
    - check-feature-completeness
    if: needs.blocked.outputs.event == 'skip-to-ci' || needs.check-feature-completeness.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["ci-quality-gate-green", "ci-unit-tests-green", "ci-integration-tests-green", "ci-e2e-tests-green", "ci-coverage-green"]'
  check-dependencies:
    needs:
    - blocked
    - check-ci
    if: needs.blocked.outputs.event == 'skip-to-dependencies' || needs.check-ci.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: merge-queue
        cost: cheap
        prompt: |
          Check PR/issue for "depends on" refs. Each dependency must be: (a) merged into main, or (b) ready to merge (CI green, complete, unblocked). All satisfied or none → pass. Any blocked → report which and why.
  mark-mergeable:
    needs: check-dependencies
    if: needs.check-dependencies.outputs.event == 'all-dependencies-satisfied' || needs.check-dependencies.outputs.event ==
      'no-dependencies'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '[]'
  assign-merge-queue:
    needs:
    - mark-mergeable
    - waiting-for-queue-head
    if: needs.mark-mergeable.outputs.event == 'on_success' || needs.waiting-for-queue-head.outputs.event == 'queue-position-advanced'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '[]'
  waiting-for-queue-head:
    needs: assign-merge-queue
    if: needs.assign-merge-queue.outputs.event == 'waiting-in-queue'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          PR is queued behind others. When PRs ahead have landed, re-evaluate position.
  execute-merge:
    needs: assign-merge-queue
    if: needs.assign-merge-queue.outputs.event == 'at-queue-head'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '[]'
  done:
    needs: execute-merge
    if: needs.execute-merge.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - check-ci
    - check-dependencies
    - check-feature-completeness
    - check-pr-structure
    - execute-merge
    - mark-mergeable
    if: needs.check-ci.outputs.event == 'on_fail' || needs.check-dependencies.outputs.event == 'dependencies-not-ready' ||
      needs.check-feature-completeness.outputs.event == 'on_failure' || needs.check-pr-structure.outputs.event == 'on_fail'
      || needs.execute-merge.outputs.event == 'on_failure' || needs.mark-mergeable.outputs.event == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking condition before the PR can proceed.
  aborted:
    needs:
    - blocked
    - waiting-for-queue-head
    if: needs.blocked.outputs.event == 'abort' || needs.waiting-for-queue-head.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
