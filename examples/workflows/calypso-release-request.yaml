name: calypso-release-request
'on':
  workflow_dispatch:
    inputs:
      event:
        description: git-tag-push
        required: false
        default: git-tag-push
  workflow_call: null
jobs:
  tag-received:
    needs: blocked
    if: needs.blocked.outputs.event == 'issue-cleared'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'Running checks: tag-is-semver, tag-commit-is-on-main'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  release-quality:
    needs:
    - blocked
    - tag-received
    if: needs.blocked.outputs.event == 'retry-quality' || needs.tag-received.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["release-lint-passing", "release-format-clean", "release-build-verification-passing"]'
  release-tests:
    needs:
    - blocked
    - release-quality
    if: needs.blocked.outputs.event == 'retry-tests' || needs.release-quality.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["ci-unit-tests-green", "ci-integration-tests-green", "ci-e2e-tests-green"]'
  build-release-bundle:
    needs:
    - blocked
    - release-tests
    if: needs.blocked.outputs.event == 'retry-build' || needs.release-tests.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["cli-binary-built", "github-release-created", "github-release-asset-attached"]'
  build-container-image:
    needs:
    - blocked
    - build-release-bundle
    if: needs.blocked.outputs.event == 'retry-container' || needs.build-release-bundle.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["docker-image-built", "docker-image-pushed-to-ghcr", "ghcr-image-tag-matches-semver"]'
  smoke-test:
    needs:
    - blocked
    - build-container-image
    if: needs.blocked.outputs.event == 'retry-smoke' || needs.build-container-image.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '["smoke-test-passed"]'
  mark-latest:
    needs: smoke-test
    if: needs.smoke-test.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-github-poller
      with:
        checks: '[]'
  done:
    needs: mark-latest
    if: needs.mark-latest.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - build-container-image
    - build-release-bundle
    - mark-latest
    - release-quality
    - release-tests
    - smoke-test
    - tag-received
    if: needs.build-container-image.outputs.event == 'on_fail' || needs.build-release-bundle.outputs.event == 'on_fail' ||
      needs.mark-latest.outputs.event == 'on_failure' || needs.release-quality.outputs.event == 'on_fail' || needs.release-tests.outputs.event
      == 'on_fail' || needs.smoke-test.outputs.event == 'on_fail' || needs.tag-received.outputs.event == 'on_fail'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Inspect the failed CI job, fix root cause, re-push tag or re-run workflow.
  aborted:
    needs: blocked
    if: needs.blocked.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
