name: calypso-orchestrator-startup
'on':
  schedule:
  - cron: 0 */5 * * * *
  workflow_call: null
  workflow_dispatch: null
jobs:
  scan-work-queue:
    needs:
    - blocked
    - dispatch-development
    - dispatch-merge
    - dispatch-planning
    - idle
    if: needs.blocked.outputs.event == 'issue-cleared' || needs.dispatch-development.outputs.event == 'done' || needs.dispatch-merge.outputs.event
      == 'done' || needs.dispatch-planning.outputs.event == 'done' || needs.idle.outputs.event == 'new-task-queued'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: orchestrator
        cost: cheap
        prompt: |
          Scan pending work in priority order: (1) planning — unspecified features or incomplete specs, (2) merge — implementation-complete branches waiting to land, (3) development — active or unstarted feature branches. Report the full queue, select the highest-priority item, declare its category.
  dispatch-planning:
    needs: scan-work-queue
    if: needs.scan-work-queue.outputs.event == 'planning-task-identified'
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    uses: ./.github/workflows/calypso-planning.yml
  dispatch-merge:
    needs: scan-work-queue
    if: needs.scan-work-queue.outputs.event == 'merge-task-identified'
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    uses: ./.github/workflows/calypso-pr-review-merge.yml
  assign-phase-issues:
    needs: scan-work-queue
    if: needs.scan-work-queue.outputs.event == 'development-task-identified'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: orchestrator
        cost: cheap
        prompt: |
          Read docs/plan.md. Find the earliest phase with open, unstarted issues. Assign one issue per available worker via `gh issue edit --add-assignee`, respecting dependency order (no issue assigned before its dependencies merge). One worker available → assign single highest-priority issue.
  dispatch-development:
    needs: assign-phase-issues
    if: needs.assign-phase-issues.outputs.event == 'on_success'
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    uses: ./.github/workflows/calypso-default-feature-workflow.yml
  idle:
    needs: scan-work-queue
    if: needs.scan-work-queue.outputs.event == 'no-pending-tasks'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          No pending work. Wait for a new feature to be queued or an external trigger.
  blocked:
    needs:
    - assign-phase-issues
    - dispatch-development
    - dispatch-merge
    - dispatch-planning
    if: needs.assign-phase-issues.outputs.event == 'on_failure' || needs.dispatch-development.outputs.event == 'aborted' ||
      needs.dispatch-merge.outputs.event == 'aborted' || needs.dispatch-planning.outputs.event == 'aborted'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          A task dispatch hit a blocking condition. Resolve or redirect to a different task.
  done:
    needs:
    - blocked
    - idle
    if: needs.blocked.outputs.event == 'abort' || needs.idle.outputs.event == 'shutdown-requested'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
