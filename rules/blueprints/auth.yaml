meta:
  domain: AUTH
  title: Authentication & Authorization Blueprint
  version: 1
  requires:
    - DATA

rules:
  # ── Threats ──────────────────────────────────────────────────────────────────

  - number: AUTH-T-001
    hash: 8122afb85345
    name: phished-or-stolen-credentials
    type: threat
    description: >
      Phished or stolen user credentials compromise user sessions, personal data,
      and account integrity.
    links: []
    deprecated: false

  - number: AUTH-T-002
    hash: f6770a061f91
    name: algorithm-confusion-in-token-verification
    type: threat
    description: >
      Algorithm confusion in token verification (e.g., alg:none or HS256
      substitution) allows forged tokens to be accepted.
    links: []
    deprecated: false

  - number: AUTH-T-003
    hash: 6209f9dcbb96
    name: compromised-admin-account
    type: threat
    description: >
      A compromised admin account exposes all user data, system configuration,
      and encryption keys.
    links: []
    deprecated: false

  - number: AUTH-T-004
    hash: ba558b0ef32a
    name: rogue-agent-exceeding-scope
    type: threat
    description: >
      A rogue AI agent exceeding its authorized scope can access customer records,
      gain write access to production entity types, or steal other agents'
      credentials.
    links: []
    deprecated: false

  - number: AUTH-T-005
    hash: 6db7c60cbba6
    name: replay-of-intercepted-tokens
    type: threat
    description: >
      Replay of intercepted authentication tokens compromises session integrity;
      replayed tokens must not grant access.
    links: []
    deprecated: false

  - number: AUTH-T-006
    hash: 51b316e8cf7f
    name: credential-stuffing-brute-force
    type: threat
    description: >
      Credential stuffing or brute-force attacks against login endpoints threaten
      account availability and integrity.
    links: []
    deprecated: false

  - number: AUTH-T-007
    hash: b23a5949b8dc
    name: single-insider-privileged-operation
    type: threat
    description: >
      A single insider unilaterally approving a privileged operation can compromise
      root key material, bulk data exports, and key rotation.
    links: []
    deprecated: false

  - number: AUTH-T-008
    hash: 2bc0827e581f
    name: external-auth-provider-outage
    type: threat
    description: >
      An external authentication provider outage locks users out of an otherwise
      operational system.
    links: []
    deprecated: false

  - number: AUTH-T-009
    hash: 5a23762c9b47
    name: session-token-xss-exfiltration
    type: threat
    description: >
      Session token exposed via client-side script (XSS exfiltration); tokens
      must not be readable by JavaScript.
    links: []
    deprecated: false

  - number: AUTH-T-010
    hash: 2e60e9e971a2
    name: agent-credential-leaked-in-logs
    type: threat
    description: >
      Agent credential leaked in logs or error output; blast radius must be
      bounded by scope and TTL.
    links: []
    deprecated: false

  # ── Principles ───────────────────────────────────────────────────────────────

  - number: AUTH-P-001
    hash: 24cd299b632f
    name: passkey-first-password-never
    type: principle
    description: >
      The system uses passkey-based authentication (FIDO2 WebAuthn) as the sole
      primary credential mechanism. Passwords are never offered. The private key
      never leaves the user's device, eliminating server-side credential theft,
      phishing, credential stuffing, and reuse attacks at the protocol level.
    links: []
    deprecated: false

  - number: AUTH-P-002
    hash: 98659756871c
    name: tokens-opaque-to-browsers
    type: principle
    description: >
      Session tokens are stored in HTTP-only, Secure, SameSite=Strict cookies
      and are never accessible to client-side JavaScript. This eliminates session
      hijacking as a consequence of XSS without depending on the application
      being XSS-free.
    links: []
    deprecated: false

  - number: AUTH-P-003
    hash: adff78a52d6d
    name: agent-credentials-scoped-and-short-lived
    type: principle
    description: >
      Every agent credential carries explicit scope claims and expires within
      24 hours. Broad, long-lived agent tokens are never issued. Worker daemon
      service accounts are a distinct credential category with their own lifecycle;
      the short-lived constraint applies to per-task delegated user tokens.
    links: []
    deprecated: false

  - number: AUTH-P-004
    hash: fe40f06bf5c2
    name: credential-domains-stay-separate
    type: principle
    description: >
      The platform maintains distinct credential classes: end-user session
      credentials (prove identity), worker service credentials (prove which
      daemon), delegated authority tokens (prove who authorized a task-scoped
      action), and twin credentials (prove sandbox-only context). These classes
      must never collapse into one another.
    links: []
    deprecated: false

  - number: AUTH-P-005
    hash: b38917607d24
    name: auth-policy-enforced-through-deterministic-gates
    type: principle
    description: >
      Credential policy is enforced through machine-checkable gates, not prose.
      The workflow must define deterministic checks for accepted credential
      classes, allowed signing algorithms, revocation behavior, privileged-operation
      approval requirements, and sandbox boundary separation.
    links: []
    deprecated: false

  - number: AUTH-P-006
    hash: b8af437531ff
    name: authority-and-execution-are-separate-facts
    type: principle
    description: >
      The system must preserve the distinction between the principal that had
      authority to perform an action and the actor that executed it. Both facts
      are recorded. "The agent acted on behalf of the user" is not the same as
      "the user executed the action personally."
    links: []
    deprecated: false

  - number: AUTH-P-007
    hash: 0962b79e682e
    name: no-single-actor-authorizes-privileged-operations
    type: principle
    description: >
      Operations touching root key material, bulk data exports, or authentication
      infrastructure require M-of-N approval from distinct human operators. This
      is a cryptographic constraint enforced through secret sharing, not a
      workflow preference.
    links: []
    deprecated: false

  - number: AUTH-P-008
    hash: 701fb5c194b8
    name: authentication-is-self-hosted
    type: principle
    description: >
      The critical login path (credential verification, token issuance, session
      creation) runs on infrastructure the team owns. External identity providers
      may participate in federated flows but are never the sole authentication
      path. If the external provider goes down, users authenticate via the
      self-hosted passkey flow.
    links: []
    deprecated: false

  - number: AUTH-P-009
    hash: 0ce2a38691c6
    name: algorithm-pinned-not-negotiated
    type: principle
    description: >
      Token verification accepts exactly one signing algorithm, configured at
      deployment time and never read from the token header. Algorithm negotiation
      is the root cause of algorithm confusion attacks. Pinning makes these
      attacks structurally impossible. The same rule applies to consequential
      transaction signatures.
    links: []
    deprecated: false

  # ── Design Patterns ──────────────────────────────────────────────────────────

  - number: AUTH-D-001
    hash: 91782768755f
    name: passkey-authentication
    type: design_pattern
    description: >
      Use WebAuthn for all user authentication. During registration the device
      generates an asymmetric key pair; the private key stays on-device. During
      login the server issues a random challenge, the device signs it, and the
      server verifies against the stored public key. No shared secret crosses the
      network. Replay is prevented by unique, time-bound challenges.
    links:
      - rel: mitigates
        target: 8122afb85345
      - rel: mitigates
        target: 6db7c60cbba6
      - rel: mitigates
        target: 51b316e8cf7f
    deprecated: false

  - number: AUTH-D-002
    hash: 7a27eb77385c
    name: pinned-algorithm-token-verification
    type: design_pattern
    description: >
      The server is configured with exactly one acceptable signing algorithm at
      deployment time. During verification the server ignores the alg field in
      the token header and uses only its configured algorithm. Tokens bearing any
      other algorithm are rejected without further inspection.
    links:
      - rel: mitigates
        target: f6770a061f91
    deprecated: false

  - number: AUTH-D-003
    hash: 47fb0e2f6869
    name: scoped-agent-tokens
    type: design_pattern
    description: >
      Agents authenticate through a dedicated issuance path producing tokens with
      explicit scope claims (e.g., analytics:read, transformations:write). Maximum
      TTL is 24 hours. Scope claims are validated on every request by middleware.
      Agent registration is a human-operator action; agents cannot self-register
      or request scope escalation.
    links:
      - rel: mitigates
        target: ba558b0ef32a
      - rel: mitigates
        target: 2e60e9e971a2
    deprecated: false

  - number: AUTH-D-004
    hash: f44eec767f47
    name: delegated-transaction-authority-dual-attribution
    type: design_pattern
    description: >
      Use delegated authority plus dual attribution for consequential business
      transactions. A delegated credential binds the action to the authorizing
      principal. The request or ledger entry separately records the executing
      agent or worker identity. Validation checks both: the principal must have
      authority, and the executing agent must be registered, scoped, and permitted.
    links:
      - rel: mitigates
        target: ba558b0ef32a
    deprecated: false

  - number: AUTH-D-005
    hash: bb7657f78351
    name: sandbox-credentials-for-digital-twins
    type: design_pattern
    description: >
      Issue sandbox-only credentials for digital twin creation and execution.
      These carry explicit twin scope, are time-bounded, valid only against
      isolated twin resources, cannot be exchanged for production write authority,
      and are revoked automatically when the twin expires or is destroyed.
    links:
      - rel: mitigates
        target: ba558b0ef32a
    deprecated: false

  - number: AUTH-D-006
    hash: 9011fdadc942
    name: m-of-n-privileged-operations
    type: design_pattern
    description: >
      The key for a privileged operation is split into N shards via secret sharing
      (e.g., Shamir). M of N shards from distinct human operators on separate
      devices are required to reconstruct. Shard assembly is logged, triggers
      out-of-band notifications, and is time-bounded. Assembled keys are valid
      for a single operation. Recommended starting values: 3-of-5; minimum
      acceptable: 2-of-3.
    links:
      - rel: mitigates
        target: 6209f9dcbb96
      - rel: mitigates
        target: b23a5949b8dc
    deprecated: false

  - number: AUTH-D-007
    hash: 583a1a04f43b
    name: key-recovery-without-passwords
    type: design_pattern
    description: >
      At enrollment the user generates a recovery passphrase that encrypts a
      server-held recovery shard. Recovery requires the passphrase plus a second
      factor. The flow re-enrolls a new passkey rather than restoring the old one.
      Recovery events are logged and trigger notifications to all enrolled devices.
      Recovery is self-initiated only; support-assisted recovery requires M-of-N
      operator approval.
    links:
      - rel: mitigates
        target: 8122afb85345
    deprecated: false

  - number: AUTH-D-008
    hash: e6c8393de085
    name: http-only-session-cookies
    type: design_pattern
    description: >
      After authentication the server issues the session token as an HTTP-only
      cookie with the Secure flag and SameSite=Strict. The token never appears in
      a response body, URL parameter, or any location accessible to client-side
      scripts. For cross-subdomain deployments, configure cookies with the shared
      registrable domain; for cross-domain, use a same-origin token relay.
    links:
      - rel: mitigates
        target: 5a23762c9b47
    deprecated: false

  - number: AUTH-D-009
    hash: 61846075d02a
    name: token-revocation-store
    type: design_pattern
    description: >
      Every token carries a jti claim. The server maintains a revocation store
      keyed on jti, checked on every request. Revoked jti returns 401 regardless
      of signature and expiry. Revocation entries expire after the token's own
      exp. The store must be shared and durable across all instances. If the store
      is unreachable, auth middleware fails closed (denies requests).
    links:
      - rel: mitigates
        target: 6db7c60cbba6
    deprecated: false

  # ── Architectures ────────────────────────────────────────────────────────────

  - number: AUTH-A-001
    hash: f45cd0927a41
    name: single-application-passkey-auth
    type: architecture
    description: >
      All authentication components (passkey verification, token issuance, session
      management) run within a single application process. Passkey Store holds
      registered public keys as entities in the property graph. Token Issuer uses
      a signing key in an external HSM-backed key store. Simplest to deploy; does
      not support federated identity without rework.
    links: []
    deprecated: false

  - number: AUTH-A-002
    hash: 1e1cdc5ea63a
    name: federated-identity-self-hosted-fallback
    type: architecture
    description: >
      Enterprise tenants authenticate through their own identity provider (SAML,
      OIDC). A Token Gateway normalizes external assertions into the platform's
      internal token format. If the external provider is unavailable, users fall
      back to the self-hosted passkey path. The Resource Server sees only the
      internal token format.
    links: []
    deprecated: false

  - number: AUTH-A-003
    hash: ec6383e4a5ef
    name: agent-aware-auth-gateway
    type: architecture
    description: >
      An Auth Gateway routes by credential type: human users go through the
      passkey flow, agents through the agent registry and scope validation. Both
      paths produce tokens in the same format. The Agent Registry restricts write
      access to human operators with explicit agent-registry:write scope. Registry
      mutations are audit-logged and trigger immediate token revocation for
      affected agents.
    links: []
    deprecated: false

