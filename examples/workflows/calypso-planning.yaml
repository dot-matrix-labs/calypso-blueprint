name: calypso-planning
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  fetch-open-issues:
    needs: blocked
    if: needs.blocked.outputs.event == 'issue-cleared'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: planner
        cost: cheap
        prompt: |
          Run `gh issue list --state open --json number,title,labels,body,assignees,milestone`. Classify each issue by type (feature|bug|chore|spike|question), phase (from label/milestone), and dependencies (depends-on/blocked-by refs in body). Output a structured list.
  reconcile-plan:
    needs:
    - blocked
    - fetch-open-issues
    if: needs.blocked.outputs.event == 'retry-reconcile' || needs.fetch-open-issues.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: planner
        cost: default
        prompt: |
          Cross-reference open issues against docs/plan.md.
          - Open issue NOT in plan → add to appropriate phase (backlog if unclear), record issue number.
          - Plan item with NO open issue → if closed/merged mark complete, if broken reference flag as orphan.
          Write all changes to docs/plan.md. Record every decision.
  check-orphans:
    needs: reconcile-plan
    if: needs.reconcile-plan.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'Running checks: no-unresolved-orphans'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  resolve-orphans:
    needs: check-orphans
    if: needs.check-orphans.outputs.event == 'on_fail'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Plan items found with no corresponding open issue. For each: reopen/create the issue if needed, remove if irrelevant, or leave a note. Mark complete when all orphans resolved.
  reprioritize:
    needs:
    - blocked
    - check-orphans
    - resolve-orphans
    if: needs.blocked.outputs.event == 'retry-reprioritize' || needs.check-orphans.outputs.event == 'on_pass' || needs.resolve-orphans.outputs.event
      == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: planner
        cost: guru
        prompt: |
          Reorder docs/plan.md per phase:
          1. Topological sort by dependency graph (depends-on/blocked-by).
          2. Within same depth, sort descending risk: unfamiliar tech, unclear criteria, high fan-out, external deps, no prior art.
          One-line rationale per item. Update GitHub labels: p0 (land first) → p3 (low/future). Write to docs/plan.md.
  validate-plan:
    needs:
    - blocked
    - reprioritize
    if: needs.blocked.outputs.event == 'retry-validate' || needs.reprioritize.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: planner
        cost: guru
        prompt: |
          Verify docs/plan.md: (1) every open issue appears exactly once, (2) no items without issue refs, (3) no dependency cycles, (4) prerequisites before dependents per phase, (5) higher-risk before lower-risk at same depth with rationale. Report violations or approve.
  commit-plan:
    needs:
    - blocked
    - validate-plan
    if: needs.blocked.outputs.event == 'retry-commit' || needs.validate-plan.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: planner
        cost: cheap
        prompt: |
          `git add docs/plan.md && git commit -m "plan: reconcile issues and reprioritize phases ($(date +%Y-%m-%d))" && git push`. No other files.
  done:
    needs: commit-plan
    if: needs.commit-plan.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - commit-plan
    - fetch-open-issues
    - reconcile-plan
    - reprioritize
    - validate-plan
    if: needs.commit-plan.outputs.event == 'on_failure' || needs.fetch-open-issues.outputs.event == 'on_failure' || needs.reconcile-plan.outputs.event
      == 'on_failure' || needs.reprioritize.outputs.event == 'on_failure' || needs.validate-plan.outputs.event == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking condition and resume the planning pass.
  aborted:
    needs: blocked
    if: needs.blocked.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
