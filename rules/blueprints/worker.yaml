    links:
      - {target: 6a55cc478eca, rel: verifies}
      - {target: 50e243fb9728, rel: verifies}
    deprecated: false

  - number: WORKER-C-008
    hash: 69e1235be7de
    name: audit-log-on-vendor-invocation
    type: checklist
    description: >
      Structured execution log entries written to audit table via API on every vendor
