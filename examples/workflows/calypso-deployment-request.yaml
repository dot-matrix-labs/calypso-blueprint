name: calypso-deployment-request
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  deployment-trigger:
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Specify: release tag, target environment, deployment window confirmation (timing + on-call coverage).
  validate-release-artifacts:
    needs:
    - blocked
    - deployment-trigger
    if: needs.blocked.outputs.event == 'issue-cleared' || needs.deployment-trigger.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'Running checks: release-tag-exists, github-release-published, github-release-asset-published, ghcr-images-published, kubernetes-image-ready-signal-sent'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  cluster-preflight:
    needs:
    - blocked
    - validate-release-artifacts
    if: needs.blocked.outputs.event == 'retry-preflight' || needs.validate-release-artifacts.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'Running checks: kubernetes-cluster-reachable, kubernetes-cluster-healthy-for-upgrade'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  database-migrations:
    needs:
    - blocked
    - cluster-preflight
    if: needs.blocked.outputs.event == 'resume-rollout' || needs.cluster-preflight.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Apply all pending migrations in order. Verify system health post-migration. Confirm new app code compatible with both old and new schema versions.
  frontend-rollout:
    needs: database-migrations
    if: needs.database-migrations.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Roll out frontend deployment. Verify system healthy after rollout before proceeding to workers.
  worker-rollout:
    needs: frontend-rollout
    if: needs.frontend-rollout.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Roll out all worker deployments. Verify system healthy before proceeding to static web.
  static-web-rollout:
    needs: worker-rollout
    if: needs.worker-rollout.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Roll out static web tier (final phase). Verify end-to-end system health.
  done:
    needs: static-web-rollout
    if: needs.static-web-rollout.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - cluster-preflight
    - database-migrations
    - frontend-rollout
    - static-web-rollout
    - validate-release-artifacts
    - worker-rollout
    if: needs.cluster-preflight.outputs.event == 'on_fail' || needs.database-migrations.outputs.event == 'on_failure' || needs.frontend-rollout.outputs.event
      == 'on_failure' || needs.static-web-rollout.outputs.event == 'on_failure' || needs.validate-release-artifacts.outputs.event
      == 'on_fail' || needs.worker-rollout.outputs.event == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking deployment issue or abort. Use resume-rollout to re-enter at database-migrations.
  aborted:
    needs: blocked
    if: needs.blocked.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
