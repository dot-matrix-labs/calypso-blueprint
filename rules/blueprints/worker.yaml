    links:
      - {target: 04607753d09a, rel: verifies}
      - {target: 6259fcb38e4b, rel: verifies}
    deprecated: false

  - number: WORKER-C-007
    hash: fb9c8615723a
    name: vendor-cli-array-form-spawn
    type: checklist
