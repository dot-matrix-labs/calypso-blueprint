name: calypso-default-deployment-workflow
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  release-candidate:
    needs: blocked
    if: needs.blocked.outputs.event == 'issue-cleared'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'Running checks: main-commit-selected, ci-quality-gate-green, ci-unit-tests-green, ci-integration-tests-green, ci-e2e-tests-green, ci-coverage-green'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  tag-release:
    needs: release-candidate
    if: needs.release-candidate.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: release-manager
        cost: cheap
        prompt: |
          Tag the main commit with semver + 6-digit PR hash suffix (e.g. v1.2.3+abc123). Verify commit is on main and all required CI passed on that exact commit.
  publish-release:
    needs: tag-release
    if: needs.tag-release.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'Running checks: github-release-published, github-release-asset-published, ghcr-images-published, kubernetes-image-ready-signal-sent'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  wait-for-rollout-approval:
    needs: publish-release
    if: needs.publish-release.outputs.event == 'on_pass'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Confirm rollout may begin for the prepared release artifacts.
  database-migrations:
    needs:
    - blocked
    - wait-for-rollout-approval
    if: needs.blocked.outputs.event == 'resume-rollout' || needs.wait-for-rollout-approval.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Apply migrations. Verify system health. Confirm new app compatible with both old and new schema.
  frontend-rollout:
    needs: database-migrations
    if: needs.database-migrations.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Roll out frontend. Verify system healthy before proceeding.
  worker-rollout:
    needs: frontend-rollout
    if: needs.frontend-rollout.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Roll out workers. Verify system healthy before proceeding.
  static-web-rollout:
    needs: worker-rollout
    if: needs.worker-rollout.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: deploy-orchestrator
        cost: default
        prompt: |
          Roll out static web (final phase). Verify end-to-end health.
  done:
    needs: static-web-rollout
    if: needs.static-web-rollout.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - database-migrations
    - frontend-rollout
    - publish-release
    - release-candidate
    - static-web-rollout
    - tag-release
    - worker-rollout
    if: needs.database-migrations.outputs.event == 'on_failure' || needs.frontend-rollout.outputs.event == 'on_failure' ||
      needs.publish-release.outputs.event == 'on_fail' || needs.release-candidate.outputs.event == 'on_fail' || needs.static-web-rollout.outputs.event
      == 'on_failure' || needs.tag-release.outputs.event == 'on_failure' || needs.worker-rollout.outputs.event == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking release issue or abort.
  aborted:
    needs: blocked
    if: needs.blocked.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
