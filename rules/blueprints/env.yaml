    name: environment-specific-config-branches
    type: antipattern
    description: >
      Environment-specific configuration branches. Configuration files, environment variables,
      or code paths that behave differently in development versus production reintroduce the
      environment delta. There is one mode. Code that needs a flag to determine its environment
      does not know where it is running.
    links:
