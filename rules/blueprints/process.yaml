  # ── Antipatterns ─────────────────────────────────────────────────────────────

  - number: PROCESS-X-001
    hash: e856a0333bca
    name: phantom-plan
    type: antipattern
    description: >
      Writing an implementation plan at the start and never updating it. The
      plan diverges from reality within days; the agent ignores it and makes
      its own decisions. The plan becomes a historical artifact that misleads
      anyone who reads it.
    links:
      - {target: 22de09615f92, rel: contradicts}
      - {target: 8db9cf604651, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-002
    hash: a9a86673862d
    name: feature-first-development
    type: antipattern
    description: >
      Jumping to visible features before scaffold infrastructure is complete.
      The result is a demo that cannot be tested, deployed, or extended.
      Fixing the foundation after building the house is always more expensive.
    links:
      - {target: f67b4697ac23, rel: contradicts}
      - {target: 3d643a9a5413, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-003
    hash: baf471cbca13
    name: session-amnesia
    type: antipattern
    description: >
      Starting each agent session by asking what to work on instead of reading
      the next-prompt file. The agent re-derives project state from the
      codebase, arrives at a different conclusion, and produces conflicting or
      duplicate work.
    links:
      - {target: c93476ff124b, rel: contradicts}
      - {target: 7adecf113ceb, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-004
    hash: 6de50417b805
    name: parallel-agents-without-machine
    type: antipattern
    description: >
      Spawning multiple agents and hoping they coordinate through intuition,
      branch names, or chat logs. Without a governing state machine and
      deterministic gates, concurrency becomes nondeterministic drift.
    links:
      - {target: 5ad85d2660cc, rel: contradicts}
      - {target: d1479e8e74df, rel: contradicts}
      - {target: b91051b5cbdd, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-005
    hash: ab00fd72fad4
    name: monolithic-commits
    type: antipattern
    description: >
      Accumulating hours of work into a single massive commit. If the session
      crashes before commit, all work is lost. If the commit introduces a bug,
      the revert is catastrophic. Small commits are cheaper in every dimension.
    links:
      - {target: 00a96cb15cc4, rel: contradicts}
      - {target: 94f48f83cfcb, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-006
    hash: 9fa4fad8a2c3
    name: verbal-requirements
    type: antipattern
    description: >
      Accepting feature requests from chat messages, verbal conversations, or
      vague tickets without formalizing them into the PRD. The agent builds
      what it understood, which is never exactly what was meant.
    links:
      - {target: 86131854ce87, rel: contradicts}
      - {target: 036dcf4739fc, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-007
    hash: 84ac3a03267e
    name: plan-as-wishlist
    type: antipattern
    description: >
      Writing implementation plan tasks as vague goals instead of concrete,
      verifiable actions. Vague tasks produce vague work.
    links:
      - {target: 22de09615f92, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-008
    hash: cbc24fa6797a
    name: skipping-the-interview
    type: antipattern
    description: >
      Assuming the agent already knows what the product should do based on
      training data or a brief description. Every product has domain-specific
      requirements that cannot be inferred. The structured interview surfaces
      them before development begins.
    links:
      - {target: 86131854ce87, rel: contradicts}
      - {target: 036dcf4739fc, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-009
    hash: "e5c0a2d87f43"
    name: admin-bypass-on-main
    type: antipattern
    description: >
      Configuring branch protection with admin bypass actors or leaving the
      ruleset in evaluate or disabled enforcement mode. Any bypass actor
      creates a path for unreviewed, untested code to reach main. The
      temptation to add bypass actors for "hotfixes" is the canonical failure
      mode; the correct response is a fast, automated fix PR through the
      normal pipeline.
    links:
      - {target: 7d2a9f1e50c3, rel: contradicts}
      - {target: b4e71d903a28, rel: contradicts}
    deprecated: false

  - number: PROCESS-X-010
    hash: "c1e5f8a03d72"
    name: implicit-merge-order
    type: antipattern
    description: >
      Relying on PR creation order, review timing, or verbal coordination to
      enforce merge sequencing instead of declaring dependencies explicitly
      in the PR body. Any reviewer or agent with merge permissions can land
      a PR out of order, silently breaking the branch.
    links:
      - {target: 4a9c2e7d1b83, rel: contradicts}
      - {target: 8f6e7b3a1ff9, rel: contradicts}
    deprecated: false
