    hash: 9a82b0efb1bd
    name: tests-against-cluster-database
    type: antipattern
    description: >
      Tests running against the cluster database. Pointing tests at the cluster database
      eliminates the guarantee that test runs are non-destructive. Ephemeral test containers
      exist precisely so this choice never has to be made.
