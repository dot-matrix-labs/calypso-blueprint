  - number: DEPLOY-C-004
    hash: "5286b4639f51"
    name: test-env-committed
    type: checklist
    description: >
      .env.test committed with test-only credentials (no production secrets).
    links:
      - {target: 584e64645b8f, rel: verifies}
    deprecated: false

  - number: DEPLOY-C-005
    hash: "681125756d40"
    name: stdout-stderr-captured
    type: checklist
    description: >
      Stdout/stderr captured by container engine; logs accessible via
      standard container tools.
    links:
      - {target: 41353c4858b0, rel: verifies}
    deprecated: false

