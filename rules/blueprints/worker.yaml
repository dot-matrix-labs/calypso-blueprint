    links:
      - {target: 8979f3da3356, rel: verifies}
    deprecated: false

  - number: WORKER-C-009
    hash: 24b901f01525
    name: signed-intent-through-validator
    type: checklist
    description: >
      Signed transaction intent path tested: worker proposal accepted only through validator,
