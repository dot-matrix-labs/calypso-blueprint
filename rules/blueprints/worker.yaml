    type: checklist
    description: >
      Delegated token validated on result submission. A token presented with the wrong task ID
      returns 403.
    links:
      - {target: 99b401f918f7, rel: verifies}
      - {target: 7262b1c5db4f, rel: verifies}
    deprecated: false

  - number: WORKER-C-005
    hash: 52b3c6dd312d
    name: delegated-token-single-use-enforced
    type: checklist
    description: >
      Delegated token invalidated after first use. A second submission with the same token
