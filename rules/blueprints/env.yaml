    name: ephemeral-containers-not-torn-down
    type: antipattern
    description: >
      Ephemeral test containers not torn down on failure. A test runner that only tears down
      on success accumulates zombie containers, exhausting ports, disk, and memory. Teardown
      must happen in a finally block unconditionally.
