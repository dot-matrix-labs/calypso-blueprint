name: calypso-feature-request
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  intake:
    needs:
    - architecture-evaluation
    - blocked
    if: needs.architecture-evaluation.outputs.event == 'clarification-needed' || needs.blocked.outputs.event == 'resubmit'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Describe the feature: motivation (why needed), intended experience (what user can do), known constraints (scope/approach limits).
  architecture-evaluation:
    needs:
    - blocked
    - intake
    if: needs.blocked.outputs.event == 'issue-cleared' || needs.intake.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: architect
        cost: guru
        prompt: |
          Evaluate against current architecture. Feasibility (invariants preserved?), clarity (specific enough to implement?), risk (conflicts, data model impact, cross-cutting concerns?). Clear+feasible → approve. Unclear → return to intake with specifics. Conflict → block with rationale.
  create-github-issue:
    needs: architecture-evaluation
    if: needs.architecture-evaluation.outputs.event == 'architecture-clear'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: feature-definer
        cost: default
        prompt: |
          Create GitHub issue: clear title, motivation, scope + acceptance criteria, architectural notes from evaluation, relevant doc links. Apply appropriate labels.
  update-plan:
    needs: create-github-issue
    if: needs.create-github-issue.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: planner
        cost: default
        prompt: |
          Add feature to docs/plan.md: GitHub issue reference, relative priority, known dependencies, phasing constraints.
  planning:
    needs: update-plan
    if: needs.update-plan.outputs.event == 'on_success'
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    uses: ./.github/workflows/calypso-planning.yml
  done:
    needs: planning
    if: needs.planning.outputs.event == 'done'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: done'''
      shell: bash
  blocked:
    needs:
    - architecture-evaluation
    - create-github-issue
    - update-plan
    if: needs.architecture-evaluation.outputs.event == 'architecture-conflict' || needs.create-github-issue.outputs.event
      == 'on_failure' || needs.update-plan.outputs.event == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking issue before the feature request can continue.
  aborted:
    needs:
    - blocked
    - planning
    if: needs.blocked.outputs.event == 'abort' || needs.planning.outputs.event == 'aborted'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
