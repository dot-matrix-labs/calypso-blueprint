    links:
      - {target: cbc1e836c877, rel: verifies}
    deprecated: false

  - number: WORKER-C-011
    hash: 7affec197709
    name: digital-twin-sandbox-tested
    type: checklist
    description: >
      Digital twin mode tested: worker receives sandbox credentials, executes simulation, and
