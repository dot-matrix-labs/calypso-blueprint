version: 1
name: calypso-implementation-loop
initial_state: write-increment

# The implementation loop is the innermost development cycle:
# write code → run tests → evaluate → iterate or advance.
#
# This state machine is entered from the feature workflow when the TDD
# red phase is complete and failing tests are ready. It exits when
# all tests pass or when a blocking condition requires human input.
#
# When the agent gets stuck, it escalates through three context-loading
# stages before asking a human. Each stage gives the agent progressively
# broader context to self-unblock:
#   1. consult-issue-spec           — re-read the GitHub issue
#   2. consult-implementation-rules — re-read rules/implementations/
#   3. consult-blueprint            — re-read rules/blueprints/
# Only after exhausting all three does it reach a human gate.
#
# Gate categories active in this loop:
#   agent      — subjective quality judgements (is this test failure meaningful?)
#   git-hook   — not applicable here; git hooks fire at commit/push time (save-state)
#   ci         — not applicable here; CI runs after push (save-state)

states:
  write-increment:
    kind: agent
    role: engineer
    cost: default
    description: >
      Write the minimal code increment needed to advance the failing tests.
      Do not over-implement — only add what the current red tests require.
    prompt: |
      Write the next increment of implementation:
        - Focus on the test(s) currently failing.
        - Write only what is needed to make those tests pass — no more.
        - Do not commit or push; that happens in save-state.
        - Do not refactor or clean up beyond what is required to make tests pass.
    completion:
      all_of:
        - code-increment-written
    next:
      on_success: run-tests
      on_failure: blocked

  run-tests:
    kind: deterministic
    description: >
      Execute the full test suite. This is a deterministic step — the agent
      runs the test command and captures the output verbatim.
    command: bun test
    next:
      on:
        tests-all-pass: evaluate-results
        tests-still-failing: evaluate-results
        test-infrastructure-error: fix-test-infra

  evaluate-results:
    kind: agent
    role: engineer
    cost: cheap
    description: >
      Interpret the test output and decide what to do next. The agent must
      distinguish between: meaningful progress toward passing, no progress
      (stuck), a test infrastructure problem, or an implementation uncertainty.
    prompt: |
      Evaluate the test run output:
        - If all tests pass: exit the implementation loop.
        - If tests are still failing but the failures changed in a way that
          shows progress: return to write-increment.
        - If tests are failing and the same failures repeat with no change
          after two or more increments: transition to diagnose-stuck.
        - If the test runner itself failed (import error, environment issue,
          build error unrelated to logic): transition to fix-test-infra.
        - If you are uncertain how to implement the feature correctly (not a
          test runner problem, not a clear stub mismatch — a genuine uncertainty
          about what the code should do): transition to consult-issue-spec
          to reload context before continuing.
    completion:
      any_of:
        - all-tests-passing
        - tests-failing-with-progress
        - tests-failing-no-progress
        - test-infrastructure-error
        - implementation-uncertain
    next:
      on:
        all-tests-passing: exit-success
        tests-failing-with-progress: write-increment
        tests-failing-no-progress: diagnose-stuck
        test-infrastructure-error: fix-test-infra
        implementation-uncertain: consult-issue-spec

  diagnose-stuck:
    kind: agent
    role: engineer
    cost: default
    description: >
      Analyze why no progress is being made. The agent must determine
      whether the stubs, the tests, or the implementation approach are
      at fault — then either self-correct or begin the escalation chain.
    prompt: |
      You have not made progress across two or more increments. Diagnose:
        1. Re-read the failing test carefully. Is the test correctly written
           against the stub interface?
        2. Re-read the stub. Does it match what the test expects?
        3. Compare the current test failures against the previous failures.
           Is the implementation approach fundamentally misaligned?
        If you identify a fixable inconsistency (stub mismatch, test bug,
          wrong approach): correct it and return to write-increment.
        If the issue is a test infrastructure problem (environment, config,
          tooling): transition to fix-test-infra.
        If you still cannot identify a path forward: transition to
          consult-issue-spec to reload the feature spec as the first
          escalation step.
    completion:
      any_of:
        - inconsistency-identified-and-corrected
        - test-infrastructure-error
        - still-cannot-identify-path
    next:
      on:
        inconsistency-identified-and-corrected: write-increment
        test-infrastructure-error: fix-test-infra
        still-cannot-identify-path: consult-issue-spec

  consult-issue-spec:
    kind: agent
    role: engineer
    cost: default
    description: >
      Escalation level 1. Re-read the full GitHub issue — feature description,
      acceptance criteria, API contract, and examples — to check whether the
      current implementation approach is aligned with what was actually asked for.
      Many stuck implementations are misreading the spec.
    prompt: |
      You are stuck. Before escalating further, re-read the full GitHub issue:
        1. Read the feature description from top to bottom.
        2. Read every acceptance criterion. For each one: can you state in one
           sentence exactly what code change satisfies it?
        3. Read the API contract and any usage examples in the issue.
        4. Compare what you have implemented against what the issue describes.
           Identify any mismatch between your implementation and the spec.
        If you now understand what to implement:
          - Summarize the misalignment you found.
          - Transition to write-increment to apply the correction.
        If the spec is clear but you still do not know how to implement it
        within the existing codebase constraints:
          - Transition to consult-implementation-rules for the next escalation.
    completion:
      any_of:
        - implementation-unblocked
        - still-unclear-after-spec
    next:
      on:
        implementation-unblocked: write-increment
        still-unclear-after-spec: consult-implementation-rules

  consult-implementation-rules:
    kind: agent
    role: engineer
    cost: guru
    description: >
      Escalation level 2. Re-read the implementation rules for this codebase
      (rules/implementations/). These define required patterns, forbidden
      approaches, module boundaries, and architectural constraints that must
      be observed. The implementation may be failing because it violates a rule.
    prompt: |
      You are still stuck after re-reading the spec. Re-read the implementation
      rules now:
        1. Read all files under rules/implementations/ relevant to the language
           and domain of this feature.
        2. For each failing test: check whether the implementation approach
           violates any rule (wrong module boundary, forbidden dependency,
           disallowed pattern, missing required abstraction).
        3. Check whether the test itself is testing something the rules prohibit.
        If you identify a rules violation or a rules-mandated pattern you were
        not following:
          - Note the rule and how it changes your approach.
          - Transition to write-increment to apply the correction.
        If the rules do not resolve the uncertainty:
          - Transition to consult-blueprint for the final escalation.
    completion:
      any_of:
        - implementation-unblocked
        - still-unclear-after-rules
    next:
      on:
        implementation-unblocked: write-increment
        still-unclear-after-rules: consult-blueprint

  consult-blueprint:
    kind: agent
    role: engineer
    cost: guru
    description: >
      Escalation level 3. Re-read the full blueprint rules (rules/blueprints/).
      These define the highest-level architectural invariants of the system —
      domain model, service boundaries, data ownership, and process rules.
      If the feature cannot be implemented after reading the blueprint, it
      requires operator clarification.
    prompt: |
      You are still stuck after reading the spec and the implementation rules.
      Re-read the full blueprint now:
        1. Read all files under rules/blueprints/ relevant to this feature's
           domain (process, UX, data model, etc.).
        2. Identify whether the feature as described in the issue conflicts
           with any blueprint invariant — this would be an issue-level defect,
           not an implementation problem.
        3. Identify whether the failing tests are testing something that the
           blueprint prohibits or requires a different architectural approach
           than what the stubs currently define.
        If the blueprint clarifies the correct approach:
          - Note the principle and how it resolves the implementation question.
          - Transition to write-increment to apply the correction.
        If after reading all three levels (spec, rules, blueprint) you still
        cannot determine the correct implementation:
          - State precisely what is ambiguous and why none of the three
            reference levels resolved it.
          - Transition to request-clarification for operator input.
    completion:
      any_of:
        - implementation-unblocked
        - still-unclear-after-blueprint
    next:
      on:
        implementation-unblocked: write-increment
        still-unclear-after-blueprint: request-clarification

  fix-test-infra:
    kind: agent
    role: engineer
    cost: default
    description: >
      Fix a test infrastructure problem preventing test execution. This covers
      build errors, missing imports, environment configuration, and test runner
      setup — not logic failures in the implementation under test.
    prompt: |
      The test runner failed before reaching the test logic. Fix the infrastructure:
        - Identify whether the issue is a missing import, build error,
          environment variable, test setup/teardown, or tooling misconfiguration.
        - Fix the issue at its root — do not suppress or skip the failing test.
        - After the fix, return to run-tests to verify the runner succeeds.
        - If the infrastructure issue requires an external dependency or
          operator action to resolve, transition to request-clarification.
    completion:
      any_of:
        - infrastructure-fixed
        - still-cannot-identify-path
    next:
      on:
        infrastructure-fixed: run-tests
        still-cannot-identify-path: consult-issue-spec

  request-clarification:
    kind: human
    role: operator
    description: >
      The agent cannot continue without operator input. A specific question
      must be posed — the agent must not block without stating what it needs.
    prompt: |
      Answer the clarification question to unblock the implementation loop.
    completion:
      all_of:
        - clarification-answered
    next:
      on_success: write-increment

  exit-success:
    kind: terminal
    description: All tests pass. The implementation loop is complete. Return to save-state.

  blocked:
    kind: human
    role: operator-or-orchestrator
    description: A step hit an unexpected blocking condition requiring human resolution.
    next:
      on:
        issue-cleared: write-increment
        abort: aborted

  aborted:
    kind: terminal

checks:
  # write-increment
  code-increment-written:
    kind: agent
    role: engineer
    description: At least one file was modified in service of making failing tests pass.

  # run-tests / evaluate-results
  all-tests-passing:
    kind: deterministic
    description: The test runner exited 0 and reported zero failures.
  tests-failing-with-progress:
    kind: agent
    role: engineer
    description: >
      Test failures changed relative to the previous run in a way that
      indicates the implementation is advancing toward correctness.
  tests-failing-no-progress:
    kind: agent
    role: engineer
    description: >
      The same test failures have occurred across two or more consecutive
      increments with no meaningful change in failure output.
  test-infrastructure-error:
    kind: deterministic
    description: >
      The test runner itself failed before executing any test logic —
      import error, build failure, environment misconfiguration, etc.
  implementation-uncertain:
    kind: agent
    role: engineer
    description: >
      The agent is genuinely uncertain how to implement the feature correctly —
      not a test runner problem or a clear stub mismatch, but an uncertainty
      about what the code should do.

  # diagnose-stuck
  inconsistency-identified-and-corrected:
    kind: agent
    role: engineer
    description: >
      The agent identified a stub/test/requirement inconsistency and corrected
      it without operator input, enabling the implementation to advance.
  still-cannot-identify-path:
    kind: agent
    role: engineer
    description: >
      After reviewing the failing tests, stubs, and previous failures, the
      agent cannot identify a path forward and must escalate.

  # fix-test-infra
  infrastructure-fixed:
    kind: agent
    role: engineer
    description: >
      The test infrastructure issue was resolved and the test runner
      can now execute the test suite.

  # escalation chain (consult-issue-spec → consult-implementation-rules → consult-blueprint)
  implementation-unblocked:
    kind: agent
    role: engineer
    description: >
      After consulting a reference source, the agent now understands what to
      implement and can return to write-increment.
  still-unclear-after-spec:
    kind: agent
    role: engineer
    description: >
      After re-reading the full GitHub issue, the agent still cannot determine
      the correct implementation approach.
  still-unclear-after-rules:
    kind: agent
    role: engineer
    description: >
      After re-reading the implementation rules, the agent still cannot determine
      the correct implementation approach.
  still-unclear-after-blueprint:
    kind: agent
    role: engineer
    description: >
      After re-reading the blueprint rules, the agent still cannot determine
      the correct implementation approach. Human clarification is required.

  # request-clarification
  clarification-answered:
    kind: human
    description: The operator has responded to the agent's clarification request.
