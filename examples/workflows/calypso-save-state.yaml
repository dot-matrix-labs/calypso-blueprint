name: calypso-save-state
'on':
  workflow_call: null
  workflow_dispatch: null
jobs:
  stage-changes:
    needs:
    - blocked
    - commit
    - push
    if: needs.blocked.outputs.event == 'issue-cleared' || needs.commit.outputs.event == 'on_rejection' || needs.push.outputs.event
      == 'on_rejection'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          1. Update docs/plans/implementation-plan.md — check off completed tasks, add newly discovered tasks.
          2. Overwrite docs/plans/next-prompt.md — self-contained prompt for a fresh agent with no prior context.
          3. Stage code changes + both planning docs (pre-commit blocks if either missing).
          4. No unrelated files, artifacts, or .env. Verify with `git status`.
  commit:
    needs: stage-changes
    if: needs.stage-changes.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          `git commit` with conventional commit message.
          - prepare-commit-msg injects CALYPSO_CHECKLIST — check every item.
          - Append GIT_BRAIN_METADATA: retroactive_prompt, outcome, context, agent, session, hints.
          - pre-commit BLOCKS on: conflict markers in .md, .js files, npm/yarn, mock libs, skipped tests, forbidden packages, unstaged planning docs. Auto-fixes lint/format (re-stage if modified).
          - commit-msg BLOCKS on: unchecked checklist, missing/invalid GIT_BRAIN_METADATA.
          If blocked → fix, return to stage-changes.
  push:
    needs: commit
    if: needs.commit.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          `git push origin <branch>`.
          pre-push BLOCKS on: .js in apps/packages, forbidden packages, eslint errors, prettier errors, tsc errors.
          Non-blocking: PR size >20 files (advisory), test failures (logged to next-prompt.md).
          If rejected → fix violations, return to stage-changes.
  update-issue:
    needs: push
    if: needs.push.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: cheap
        prompt: |
          Update GitHub issue: check "implementation" checkbox if all tests pass. Post status comment (what was implemented, what passes, what remains). Do not check "saved" yet — that waits for CI green.
  verify-ci-started:
    needs: update-issue
    if: needs.update-issue.outputs.event == 'on_success'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      run: |-
        echo 'verify-ci-started'
        echo "event=on_pass" >> "$GITHUB_OUTPUT"
      shell: bash
  diagnose-ci-start-failure:
    needs: verify-ci-started
    if: needs.verify-ci-started.outputs.event == 'ci-not-started'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: default
        prompt: |
          `git fetch origin main` then `git merge-tree` to detect conflicts. Conflict → conflict-with-main. No conflict → check Actions status and branch protection. Unresolvable → blocked.
  evaluate-completeness:
    needs: verify-ci-started
    if: needs.verify-ci-started.outputs.event == 'ci-started'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-agent
      with:
        role: engineer
        cost: guru
        prompt: |
          Re-read issue acceptance criteria. All met + all checkboxes checked → check "saved" checkbox, exit-complete. Any remaining → exit-incomplete.
  exit-complete:
    needs: evaluate-completeness
    if: needs.evaluate-completeness.outputs.event == 'feature-complete'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: exit-complete'''
      shell: bash
  exit-incomplete:
    needs: evaluate-completeness
    if: needs.evaluate-completeness.outputs.event == 'feature-incomplete'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: exit-incomplete'''
      shell: bash
  conflict-with-main:
    needs: diagnose-ci-start-failure
    if: needs.diagnose-ci-start-failure.outputs.event == 'conflict-with-main-detected'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: conflict-with-main'''
      shell: bash
  blocked:
    needs:
    - commit
    - diagnose-ci-start-failure
    - push
    - stage-changes
    - update-issue
    if: needs.commit.outputs.event == 'on_failure' || needs.diagnose-ci-start-failure.outputs.event == 'ci-start-failure-unresolvable'
      || needs.push.outputs.event == 'on_failure' || needs.stage-changes.outputs.event == 'on_failure' || needs.update-issue.outputs.event
      == 'on_failure'
    runs-on: ubuntu-latest
    outputs:
      event:
        value: ${{ steps.run.outputs.event }}
    steps:
    - id: run
      uses: ./.github/actions/calypso-human-gate
      with:
        prompt: |
          Resolve the blocking issue so the save cycle can continue.
  aborted:
    needs: blocked
    if: needs.blocked.outputs.event == 'abort'
    runs-on: ubuntu-latest
    steps:
    - id: run
      run: 'echo ''Terminal state: aborted'''
      shell: bash
