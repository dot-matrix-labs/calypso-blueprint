    links:
      - {target: cbc1e836c877, rel: verifies}
      - {target: 3b08589dd247, rel: verifies}
    deprecated: false

  - number: WORKER-C-010
    hash: a83da95e0890
    name: dual-attribution-on-writes
    type: checklist
    description: >
      Dual attribution verified on consequential writes: principal authority and executing
